[alias]
build-esp32c6 = "build --release --features esp32c6 --target riscv32imac-unknown-none-elf"
test-esp32c6 = "run --release --features esp32c6,test-as-app --target riscv32imac-unknown-none-elf -- --chip esp32c6"
# TODO : add others

[target.'cfg(any(target_arch = "riscv32", target_arch = "xtensa"))']
runner = "espflash flash --monitor"

[env]
ESP_LOG="info"
ESP_BOOTLOADER_ESP_IDF_CONFIG_MMU_PAGE_SIZE = "32k"

[target.'cfg(target_arch = "xtensa")']
rustflags = ["-C", "link-arg=-nostartfiles"]

[target.'cfg(target_arch = "riscv32")']
rustflags = [
  # Required to obtain backtraces (e.g. when using the "esp-backtrace" crate.)
  # NOTE: May negatively impact performance of produced code
  "-C", "force-frame-pointers",
]

[unstable]
build-std = ["core"]
